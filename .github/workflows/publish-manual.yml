name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Exact version (e.g. 1.2.3) — only used when version_type is "custom"'
        required: false
        type: string
      publish_to:
        description: 'Registry to publish to'
        required: true
        default: both
        type: choice
        options:
          - both
          - npm
          - github
      dry_run:
        description: 'Dry run — build and version bump without publishing'
        required: false
        default: false
        type: boolean

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build library
        run: npm run build

      - name: Bump version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.version_type }}" = "custom" ]; then
            if [ -z "${{ inputs.custom_version }}" ]; then
              echo "custom_version is required when version_type is 'custom'" >&2
              exit 1
            fi
            npm version "${{ inputs.custom_version }}" --no-git-tag-version
          else
            npm version "${{ inputs.version_type }}" --no-git-tag-version
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to v$NEW_VERSION"

      - name: Commit and push version bump
        if: ${{ inputs.dry_run == false }}
        run: |
          git add package.json
          git commit -m "chore: bump version to v${{ steps.version.outputs.new_version }}"
          git push

      - name: Publish to npmjs.com
        if: ${{ inputs.dry_run == false && (inputs.publish_to == 'npm' || inputs.publish_to == 'both') }}
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access=public --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: ${{ inputs.dry_run == false && (inputs.publish_to == 'github' || inputs.publish_to == 'both') }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_TOKEN }}" > ~/.npmrc
          npm publish --registry=https://npm.pkg.github.com/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Dry run summary
        if: ${{ inputs.dry_run == true }}
        run: |
          echo "### Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Version that would be published: **v${{ steps.version.outputs.new_version }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "Registry: **${{ inputs.publish_to }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "No changes were pushed or published." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish summary
        if: ${{ inputs.dry_run == false }}
        run: |
          echo "### Published v${{ steps.version.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Registry: **${{ inputs.publish_to }}**" >> "$GITHUB_STEP_SUMMARY"
