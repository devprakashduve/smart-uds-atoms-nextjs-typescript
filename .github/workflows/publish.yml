name: CI / Release & Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Exact version (e.g. 1.2.3) — only used when version_type is "custom"'
        required: false
        type: string
      publish_to:
        description: 'Registry to publish to'
        required: true
        default: both
        type: choice
        options:
          - both
          - npm
          - github
      dry_run:
        description: 'Dry run — build and version bump without publishing'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    # Prevent infinite loop: skip if the commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build library
        run: npm run build:lib

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    # Only publish on a push/merge to main or a manual dispatch — not on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Bump version & push tag
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.version_type }}" = "custom" ]; then
              if [ -z "${{ inputs.custom_version }}" ]; then
                echo "::error::custom_version is required when version_type is 'custom'"
                exit 1
              fi
              npm version "${{ inputs.custom_version }}" --no-git-tag-version
            else
              npm version "${{ inputs.version_type }}" --no-git-tag-version
            fi
          else
            npm version patch --no-git-tag-version
          fi

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.dry_run }}" != "true" ]; then
            git add package.json
            git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
            git tag "v$NEW_VERSION"
            git push
            git push --tags
          fi

      - name: Create GitHub Release
        if: inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: v${{ steps.version.outputs.new_version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Publish to npmjs.com
        if: inputs.dry_run != 'true' && (github.event_name == 'push' || inputs.publish_to == 'npm' || inputs.publish_to == 'both')
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access=public --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: inputs.dry_run != 'true' && (github.event_name == 'push' || inputs.publish_to == 'github' || inputs.publish_to == 'both')
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_TOKEN }}" > ~/.npmrc
          npm publish --registry=https://npm.pkg.github.com/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Publish summary
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "### Dry Run Complete" >> "$GITHUB_STEP_SUMMARY"
            echo "Version that would be published: **v${{ steps.version.outputs.new_version }}**" >> "$GITHUB_STEP_SUMMARY"
            echo "No changes were pushed or published." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Published v${{ steps.version.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- npmjs.com: \`@devprakashduve/atomic-uds-next-app\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- GitHub Packages: \`@devprakashduve/atomic-uds-next-app\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- GitHub Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          fi
