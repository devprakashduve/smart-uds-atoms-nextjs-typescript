name: Release & Publish to GitHub and npm

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    # Prevent infinite loop: skip the version-bump commit pushed by this workflow
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build library
        run: npm run build:lib

      - name: Bump version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git add package.json
          git commit -m "chore: bump version to v$NEW_VERSION"
          git push

      - name: Publish to npmjs.com
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
          npm publish --access=public --registry=https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_TOKEN }}" > ~/.npmrc
          npm publish --registry=https://npm.pkg.github.com/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Publish summary
        run: |
          echo "### Published v${{ steps.version.outputs.new_version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- npmjs.com: \`@devprakashduve/atomic-uds-next-app\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub Packages: \`@devprakashduve/atomic-uds-next-app\`" >> "$GITHUB_STEP_SUMMARY"
